name: Build 1C AddIn

# Builds the self-contained UAPKI 1C:Enterprise native AddIn (Windows x64 + x86)
# and packages it into a ready-to-attach 1C bundle: Manifest.xml plus the
# per-arch binaries, each named with the version and the short commit hash.

on:
  push:
    branches: [ main ]
    paths:
      - 'library/uapki-1c/**'
      - 'library/**/CMakeLists.txt'
      - 'library/**/*-export.h'
      - 'library/common/loaders/**'
      - 'library/cm-pkcs12/src/static-api.*'
      - '.github/workflows/build-1c-addin.yml'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows ${{ matrix.arch }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            cmake_arch: x64
            out: uapki-1cWin64.dll
          - arch: x86
            cmake_arch: Win32
            out: uapki-1cWin32.dll
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        shell: bash
        run: |
          cmake -G "Visual Studio 17 2022" -A ${{ matrix.cmake_arch }} \
            -S library -B build-1c \
            -DUAPKI_BUILD_1C_ADDIN=ON \
            -DUAPKI_LIBS_TYPE=STATIC \
            -DUAPKI_CM_PKCS12_LIB_TYPE=STATIC \
            -DUAPKI_DISABLE_COPY=ON \
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded

      - name: Build
        shell: bash
        run: cmake --build build-1c --config Release --target uapki-1c

      - name: Collect binary
        shell: bash
        run: |
          mkdir -p out
          found="$(find build-1c -name '${{ matrix.out }}' -type f | head -1)"
          test -n "$found" || { echo "::error::${{ matrix.out }} not found"; exit 1; }
          cp "$found" "out/${{ matrix.out }}"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.arch }}
          path: out/${{ matrix.out }}
          if-no-files-found: error

  package:
    name: Package 1C AddIn bundle
    runs-on: ubuntu-latest
    needs: [ build-windows ]
    steps:
      - uses: actions/checkout@v4

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y zip libxml2-utils

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble bundle
        shell: bash
        run: |
          mkdir -p library/uapki-1c/pkg
          find artifacts -name 'uapki-1c*.dll' -type f -exec cp {} library/uapki-1c/pkg/ \;
          echo "Collected binaries:"; ls -l library/uapki-1c/pkg
          ( cd library/uapki-1c && ./build_pkg.sh --no-build )

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: uapki-1c-addin
          path: library/uapki-1c/uapki-1c-*.zip
          if-no-files-found: error
